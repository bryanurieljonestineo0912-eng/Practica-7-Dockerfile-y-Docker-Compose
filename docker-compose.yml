services:

  app:
    build: .
    container_name: practica7_app

    ports:
      - "5000:5000"

    depends_on:
      - db

  db:
    image: mysql:8

    container_name: practica7_mysql

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: practica7

    ports:
      - "3306:3306"
